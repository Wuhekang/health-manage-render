server:
  port: ${PORT:8088}

spring:
  main:
    lazy-initialization: true
  datasource:
    url: ${DATABASE_URL:jdbc:mysql://localhost:3307/health_management?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai}
    username: ${DATABASE_USERNAME:root}
    password: ${DATABASE_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  ai:
    openai:
      api-key: ${AI_API_KEY:disabled}
      base-url: ${AI_BASE_URL:https://ark.cn-beijing.volces.com/api}
      chat:
        options:
          model: ${AI_MODEL:doubao-seed-1-8-251228}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
